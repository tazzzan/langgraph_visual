version: "3.8"

services:
  langgraph-visualizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-visualizer
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - APP_URL=${APP_URL:-http://localhost:3000}
    # Security: run with read-only root filesystems if wanted, but standard full-stack is ideal.
